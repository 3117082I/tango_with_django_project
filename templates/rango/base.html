{% load staticfiles %}
{% load rango_template_tags %}

        {% block title_block %}

        {% endblock %}
    </title>
</head>
<body>
<div>
{% block sidebar_block %}
{% get_category_list %}
{% endblock %}
</div>

<hr />
<div>

</html>
